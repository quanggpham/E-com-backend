spring.application.name=Ecom

spring.datasource.url=jdbc:mysql://localhost:3306/ecom_db
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
#hien sql
spring.jpa.show-sql=true
#format sql
spring.jpa.properties.hibernate.format_sql=true
#hien tham so truyen vao
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.jackson.date-format=dd-MM-yyyy HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh


application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.expiration=86400000000
#1000 ngay

cloudinary.cloud-name=${cloudinary-cloud-name}
cloudinary.api-key=${cloudinary-api-key}
cloudinary.api-secret=${cloudinary-api-secret}

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB